<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 40px; }
        form { background: #2d2d2d; padding: 20px; border-radius: 8px; border: 1px solid #444; max-width: 500px; margin: 0 auto; }
        input, textarea { width: 100%; margin-bottom: 10px; background: #3d3d3d; border: 1px solid #555; color: white; padding: 8px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <header style="text-align: center;"><h1>Edit Task</h1></header>
    <form th:action="@{/tasks/update/{id}(id=${task.id})}" method="post">
        <input type="text" name="title" th:value="${task.title}">
        <textarea name="description" th:text="${task.description}"></textarea>
        <button type="submit">Save Changes</button>
        <a href="/" style="color: #aaa; margin-left: 10px;">Cancel</a>
    </form>
</body>
</html>
